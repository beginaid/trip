<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南米旅行 旅程マップ 2026 GW</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0f1923; color: #fff; }

    /* ── ヘッダー ── */
    #header {
      padding: 9px 16px;
      background: #0f1923;
      border-bottom: 1px solid #1e2d3d;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #header h1 { font-size: 14px; font-weight: 700; white-space: nowrap; }
    .header-meta { font-size: 11px; color: #7a9bb5; }

    /* ── レイアウト ── */
    #container { display: flex; height: calc(100vh - 40px); position: relative; }
    #map { flex: 1; }

    /* ── 凡例（右上フローティング） ── */
    #legend {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 900;
      background: rgba(18,30,43,0.92);
      border: 1px solid #1e2d3d;
      border-radius: 8px;
      padding: 7px 10px;
      backdrop-filter: blur(4px);
      min-width: 120px;
    }
    .legend-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; font-size: 10px; color: #c0d8e8; }
    .legend-row:last-child { margin-bottom: 0; }
    .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .lf { width: 18px; height: 2px; background: repeating-linear-gradient(90deg,#4da8da 0,#4da8da 4px,transparent 4px,transparent 7px); flex-shrink:0; }
    .lg { width: 18px; height: 2px; background: rgba(77,168,218,.55); flex-shrink:0; }
    .legend-sep { border-top: 1px solid #1e2d3d; margin: 4px 0; }

    /* ── サイドバー ── */
    #sidebar {
      width: 272px;
      background: #121e2b;
      border-left: 1px solid #1e2d3d;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-title {
      padding: 9px 14px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      color: #7a9bb5; text-transform: uppercase;
      border-bottom: 1px solid #1e2d3d;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-close { display: none; background: none; border: none; color: #7a9bb5; font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px; }
    #day-list { flex: 1; overflow-y: auto; }

    /* ── 日程アイテム ── */
    .day-item {
      padding: 9px 12px;
      border-bottom: 1px solid #1a2a3a;
      cursor: pointer;
      transition: background 0.12s;
      border-left: 3px solid transparent;
    }
    .day-item:hover, .day-item:active { background: #1a2d42; }
    .day-item.active { background: #1e3a52; border-left-color: #4da8da; }
    .day-item.is-warn { border-left-color: #e8943a; }
    .day-item.is-must { border-left-color: #fbbf24; }

    .day-header { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
    .day-badge  { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; background: #1e3a52; color: #4da8da; white-space: nowrap; }
    .day-city   { font-size: 12px; font-weight: 600; }
    .day-date   { font-size: 10px; color: #7a9bb5; margin-bottom: 2px; }
    .day-desc   { font-size: 11px; color: #9ab5cc; line-height: 1.4; }

    .country-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; margin-top: 3px; }
    .tag-peru    { background: #2d4a1e; color: #7ec850; }
    .tag-bolivia { background: #4a2d1e; color: #e8943a; }
    .tag-chile   { background: #2d1e4a; color: #b87eda; }
    .tag-japan   { background: #4a1e2d; color: #da4d7a; }

    /* ── モーダル ── */
    #day-modal {
      display: none;
      position: fixed; inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,.6);
      align-items: flex-end;
      justify-content: center;
    }
    #day-modal.open { display: flex; }

    .modal-sheet {
      width: 100%;
      max-width: 480px;
      background: #121e2b;
      border-radius: 18px 18px 0 0;
      border-top: 1px solid #1e3a52;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-handle {
      width: 36px; height: 4px; background: #2a3f56;
      border-radius: 2px; margin: 10px auto 0;
      flex-shrink: 0;
    }
    .modal-header {
      padding: 12px 16px 10px;
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 1px solid #1a2a3a;
      flex-shrink: 0;
    }
    .modal-title-area { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .modal-city { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; color: #7a9bb5; font-size: 20px; cursor: pointer; line-height: 1; padding: 0; flex-shrink: 0; }

    .modal-body { overflow-y: auto; padding: 14px 16px 20px; }
    .modal-date { font-size: 12px; color: #7a9bb5; margin-bottom: 10px; }
    .modal-badge-must { font-size: 11px; color: #fbbf24; background: #2a2200; padding: 5px 10px; border-radius: 6px; margin-bottom: 8px; }
    .modal-badge-warn { font-size: 11px; color: #e8943a; background: #2a1800; padding: 5px 10px; border-radius: 6px; margin-bottom: 8px; }
    .modal-desc { font-size: 13px; color: #9ab5cc; line-height: 1.6; margin-bottom: 12px; }
    .modal-spots-title { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #7a9bb5; margin-bottom: 6px; }
    .modal-spots { list-style: none; }
    .modal-spots li {
      font-size: 13px; color: #c0d8e8; padding: 6px 0;
      border-bottom: 1px solid #1a2a3a;
      padding-left: 14px; position: relative; line-height: 1.5;
    }
    .modal-spots li::before { content: '›'; position: absolute; left: 2px; color: #4da8da; }
    .modal-map-btn {
      margin-top: 16px; width: 100%;
      background: #1e3a52; color: #4da8da;
      border: 1px solid #4da8da; border-radius: 8px;
      padding: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .12s;
    }
    .modal-map-btn:hover { background: #253e5a; }

    /* ── Leaflet popup ── */
    .leaflet-popup-content-wrapper { background: #121e2b; color: #fff; border: 1px solid #1e3a52; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    .leaflet-popup-tip { background: #121e2b; }
    .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.6; min-width: 200px; }
    .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .popup-day   { font-size: 11px; color: #7a9bb5; margin-bottom: 5px; }

    /* ── モバイル用フローティングボタン ── */
    #list-toggle {
      display: none;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1100;
      background: #1e3a52; color: #4da8da;
      border: 1px solid #4da8da; border-radius: 24px;
      padding: 10px 22px; font-size: 13px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.5);
      white-space: nowrap;
    }

    /* ── スマホ対応 ── */
    @media (max-width: 768px) {
      #header h1 { font-size: 13px; }
      .header-meta { font-size: 10px; }
      #container { height: calc(100vh - 38px); }

      #sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%; height: 65%;
        border-left: none; border-top: 2px solid #1e2d3d;
        border-radius: 14px 14px 0 0;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 1000;
      }
      #sidebar.open { transform: translateY(0); }
      .sidebar-close { display: block; }
      #list-toggle { display: block; }

      /* モバイルではモーダルを全幅に */
      .modal-sheet { border-radius: 18px 18px 0 0; max-height: 92vh; }

      /* 凡例をさらにコンパクト */
      #legend { font-size: 9px; padding: 5px 8px; min-width: 100px; }
      .legend-row { font-size: 9px; }
    }
  </style>
</head>

}).addTo(map);

FLIGHTS.forEach(pts => {
  L.polyline(pts, { color:'#4da8da', weight:1.5, opacity:.7, dashArray:'6 5' }).addTo(map);
});
GROUNDS.forEach(pts => {
  L.polyline(pts, { color:'#4da8da', weight:2, opacity:.45 }).addTo(map);
});

const markers = [];
DAYS.forEach((d, i) => {
  const color  = COLORS[d.country];
  const size   = d.must ? 14 : 10;
  const border = d.must ? '#fbbf24' : (d.warn ? '#e8943a' : color);
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${color};border:2px solid ${border};
      box-shadow:0 0 6px ${color}88;
      ${d.must ? 'box-shadow:0 0 10px #fbbf2488,0 0 4px #fbbf24;' : ''}
    "></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2],
  });

  const m = L.marker([d.lat, d.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div class="popup-title">${d.city}</div>
    <div class="popup-day">Day ${d.day} ｜ ${d.date}</div>
  `, { maxWidth: 220 });
  m.on('click', () => selectDay(i));
  markers.push(m);
});

// ── Sidebar ──────────────────────────────────────────────
const dayList = document.getElementById('day-list');
let activeIdx = null;

function selectDay(i) {
  if (activeIdx !== null) dayList.children[activeIdx].classList.remove('active');
  activeIdx = i;
  dayList.children[i].classList.add('active');
  dayList.children[i].scrollIntoView({ behavior:'smooth', block:'nearest' });
  map.setView([DAYS[i].lat, DAYS[i].lng], Math.max(map.getZoom(), 5), { animate: true });
  markers[i].openPopup();
}

DAYS.forEach((d, i) => {
  const el = document.createElement('div');
  el.className = 'day-item' + (d.warn ? ' is-warn' : '') + (d.must ? ' is-must' : '');
  el.innerHTML = `
    <div class="day-header">
      <span class="day-badge">Day ${d.day}</span>
      <span class="day-city">${d.city}</span>
    </div>
    <div class="day-date">${d.date}</div>
    <div class="day-desc">${d.desc}</div>
    <span class="country-tag tag-${d.country}">${LABELS[d.country]}</span>
  `;
  el.addEventListener('click', () => openModal(i));
  dayList.appendChild(el);
});

// ── モーダル ─────────────────────────────────────────────
const modal       = document.getElementById('day-modal');
const modalBadge  = document.getElementById('modal-badge');
const modalCity   = document.getElementById('modal-city');
const modalCtag   = document.getElementById('modal-ctag');
const modalDate   = document.getElementById('modal-date');
const modalMust   = document.getElementById('modal-must');
const modalWarn   = document.getElementById('modal-warn');
const modalDesc   = document.getElementById('modal-desc');
const modalSpots  = document.getElementById('modal-spots');
const modalMapBtn = document.getElementById('modal-map-btn');
let modalDayIdx = null;

function openModal(i) {
  const d = DAYS[i];
  modalDayIdx = i;

  modalBadge.textContent = `Day ${d.day}`;
  modalCity.textContent  = d.city;
  modalCtag.className    = `country-tag ${CTAGS[d.country]}`;
  modalCtag.textContent  = LABELS[d.country];
  modalDate.textContent  = d.date;

  if (d.must) { modalMust.style.display = 'block'; } else { modalMust.style.display = 'none'; }
  if (d.warn) { modalWarn.style.display = 'block'; modalWarn.textContent = `⚠ ${d.warn}`; }
  else        { modalWarn.style.display = 'none'; }

  modalDesc.textContent = d.desc;
  modalSpots.innerHTML  = d.spots.map(s => `<li>${s}</li>`).join('');

  modal.classList.add('open');

  // アクティブ行をハイライト
  if (activeIdx !== null) dayList.children[activeIdx].classList.remove('active');
  activeIdx = i;
  dayList.children[i].classList.add('active');
}

function closeModal() {
  modal.classList.remove('open');
}

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

modalMapBtn.addEventListener('click', () => {
  closeModal();
  closeSidebar();
  selectDay(modalDayIdx);
});

// ── モバイル サイドバー開閉 ──────────────────────────────
const sidebar   = document.getElementById('sidebar');
const toggleBtn = document.getElementById('list-toggle');
const closeBtn  = document.getElementById('sidebar-close-btn');

function openSidebar() {
  sidebar.classList.add('open');
  toggleBtn.textContent = '地図に戻る ▼';
}
function closeSidebar() {
  sidebar.classList.remove('open');
  toggleBtn.textContent = '日程一覧 ▲';
}
toggleBtn.addEventListener('click', () => {
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
closeBtn.addEventListener('click', closeSidebar);
</script>
</body>
</html>
